<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Construction Manager</title>
    <link rel="icon" href="css/logo.png" type="image/x-icon">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown Styles for AI Response */
        .ai-response table {
            width: 100%;
            display: block;
            overflow-x: auto;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9em;
        }

        .ai-response th,
        .ai-response td {
            padding: 0.75rem;
            border: 1px solid var(--border);
            text-align: left;
        }

        .ai-response th {
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        .ai-response tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .ai-response strong {
            font-weight: bold;
            color: var(--primary);
        }

        .ai-response em {
            font-style: italic;
        }

        .ai-response ul,
        .ai-response ol {
            margin-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .ai-response li {
            margin-bottom: 0.25rem;
        }

        .ai-response h1,
        .ai-response h2,
        .ai-response h3 {
            font-weight: bold;
            color: var(--primary);
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="container flex-center" style="min-height: 100vh;">
            <div style="max-width: 600px; width: 100%; height: 80vh; display: flex; flex-direction: column;">
                <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn btn-secondary" onclick="window.location.href='/'">← Back</button>
                    <h2 style="margin: 0;">AI Assistant</h2>
                    <div style="width: 60px;"></div> <!-- Spacer -->
                </div>

                <div class="glass-card"
                    style="flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0;">
                    <div id="ai-chat-messages"
                        style="flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                        <div
                            style="align-self: flex-start; max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; background: var(--bg-card-hover); border: 1px solid var(--border);">
                            Hello! I am the Construction Manager AI, developed by Md Maruf Hasan. I am here to provide
                            Ph.D.-level expertise on construction, engineering, and safety. How can I assist you?
                        </div>
                    </div>
                    <div style="padding: 1rem; border-top: 1px solid var(--border); background: var(--bg-card);">
                        <form id="ai-chat-form" style="display: flex; gap: 0.5rem; align-items: flex-end;">
                            <textarea id="ai-input" placeholder="Ask something..." rows="1"
                                style="flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); resize: none; min-height: 44px; max-height: 150px; overflow-y: auto; font-family: inherit;"></textarea>
                            <button type="submit" class="btn btn-primary" style="height: 44px;"><i
                                    data-lucide="send"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init Theme
        (function () {
            const stored = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', stored);
            if (window.lucide) window.lucide.createIcons();
        })();

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();

            const messagesContainer = document.getElementById('ai-chat-messages');
            const form = document.getElementById('ai-chat-form');
            const input = document.getElementById('ai-input');

            // Auto-resize textarea
            input.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if (this.value === '') this.style.height = '44px';
            });

            // Handle Enter to submit
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    form.dispatchEvent(new Event('submit'));
                }
            });

            const formatMarkdown = (text) => {
                if (window.marked) {
                    return window.marked.parse(text);
                }
                let html = text
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/^\s*\*\s+(.*)/gm, '<li>$1</li>')
                    .replace(/^##\s+(.*)/gm, '<h3>$1</h3>')
                    .replace(/^#\s+(.*)/gm, '<h2>$1</h2>')
                    .replace(/\n/g, '<br>');
                return html;
            };

            const typeWriter = async (element, text) => {
                element.textContent = '';
                const delay = 2;

                for (let i = 0; i < text.length; i++) {
                    element.textContent += text.charAt(i);
                    if (i % 20 === 0) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
                element.innerHTML = formatMarkdown(text);
                element.style.whiteSpace = 'normal';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            };

            const appendMessage = (role, text) => {
                const div = document.createElement('div');
                const isUser = role === 'user';
                div.style.alignSelf = isUser ? 'flex-end' : 'flex-start';
                div.style.maxWidth = '80%';
                div.style.padding = '0.75rem 1rem';
                div.style.borderRadius = '1rem';
                div.style.background = isUser ? 'var(--primary)' : 'rgba(255,255,255,0.05)';
                div.style.color = isUser ? '#fff' : 'var(--text-main)';
                div.style.border = isUser ? 'none' : '1px solid var(--border)';
                div.style.whiteSpace = 'pre-wrap';
                div.style.wordBreak = 'break-word';

                messagesContainer.appendChild(div);

                if (isUser) {
                    div.textContent = text;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                } else {
                    div.classList.add('ai-response');
                    typeWriter(div, text);
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const query = input.value.trim();
                if (!query) return;

                appendMessage('user', query);
                input.value = '';
                input.style.height = '44px';

                // Show loading
                const loadingId = 'loading-' + Date.now();
                const loadingDiv = document.createElement('div');
                loadingDiv.id = loadingId;
                loadingDiv.style.alignSelf = 'flex-start';
                loadingDiv.style.color = 'var(--text-muted)';
                loadingDiv.style.fontStyle = 'italic';
                loadingDiv.style.padding = '0.5rem 1rem';
                loadingDiv.textContent = 'Thinking...';
                messagesContainer.appendChild(loadingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                try {
                    // Call our server-side Mistral proxy endpoint
                    const response = await fetch('/api/ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: query })
                    });

                    const data = await response.json();

                    if (document.getElementById(loadingId)) {
                        document.getElementById(loadingId).remove();
                    }

                    if (data.reply) {
                        appendMessage('assistant', data.reply);
                    } else if (data.error) {
                        console.error('AI error:', data.error);
                        appendMessage('assistant', 'Error: ' + data.error);
                    } else {
                        console.error('Unexpected response:', data);
                        appendMessage('assistant', "Sorry, I encountered an error. Please try again.");
                    }

                } catch (err) {
                    if (document.getElementById(loadingId)) {
                        document.getElementById(loadingId).remove();
                    }
                    console.error(err);
                    appendMessage('assistant', "Error connecting to AI service. Please check your internet connection.");
                }
            });

            // Focus input
            if (input) input.focus();
        });
    </script>
</body>

</html>
